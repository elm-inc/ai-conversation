# Pipecat Cloud デプロイ設定 (`pipecat cloud deploy` が --config-file 既定で参照)。
agent_name = "ai-conversation-voice"

# `pipecat cloud secrets set ai-conversation-voice-secrets KEY=VALUE ...` で作る secret set
secret_set = "ai-conversation-voice-secrets"

# エージェントプロファイル (リソースサイズ)。詳細は `pipecat cloud agent` / ダッシュボード
agent_profile = "agent-1x"

[scaling]
	min_agents = 0   # 検証中は 0 (コールド起動許容)。常時温める場合は 1+
